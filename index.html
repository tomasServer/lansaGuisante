<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <title>AR Lanzaguisantes</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./models/targets.mind;" color-space="sRGB" renderer="colorManagement: true" embedded>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="./models/mi_personaje.glb" scale="0.1 0.1 0.1" position="0 0 0"></a-gltf-model>
      </a-entity>
    </a-scene>
  </body>
</html>

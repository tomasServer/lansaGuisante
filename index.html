<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Showcase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
 
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            height: 100vh;
        }
 
        #hero-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
 
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
 
        .content-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
 
        .title {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(102, 126, 234, 0.5);
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            animation: fadeInUp 1s ease-out;
        }
 
        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: rgba(255, 255, 255, 0.8);
            font-weight: 300;
            letter-spacing: 0.1em;
            animation: fadeInUp 1s ease-out 0.3s both;
        }
 
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.5rem;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
 
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
 
        .controls {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 20;
        }
 
        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            pointer-events: auto;
        }
 
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
 
        .info {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            padding: 1rem 1.5rem;
            border-radius: 15px;
            font-size: 0.85rem;
            max-width: 300px;
            z-index: 20;
        }
 
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
 
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
 
        @media (max-width: 768px) {
            .controls {
                bottom: 1rem;
                right: 1rem;
                flex-direction: column;
            }
            
            .info {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="hero-container">
        <div id="canvas-container"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Cargando modelo 3D...</div>
        </div>
 
  
 
        <div class="controls">
            <button class="control-btn" id="toggle-rotation">⏸ Pausar</button>
            <button class="control-btn" id="toggle-animation">🎬 Animación</button>
        </div>
 
   
    </div>
 
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
 
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
 
        // ============================================
        // CONFIGURACIÓN - CAMBIA ESTA RUTA A TU MODELO
        // ============================================
        const MODEL_PATH = './models/mi_personaje.glb'; // <-- Pon aquí la ruta a tu archivo .glb
        
        // Si usas GitHub Pages, la ruta sería algo como:
        // const MODEL_PATH = 'https://tu-usuario.github.io/tu-repo/modelo.glb';
        // ============================================
 
        let scene, camera, renderer, controls;
        let model, mixer, clock;
        let autoRotate = true;
        let platform;
 
        function init() {
            const container = document.getElementById('canvas-container');
            
            // Escena
            scene = new THREE.Scene();
            scene.background = null;
            scene.fog = new THREE.Fog(0x0a0a0a, 10, 50);
 
            // Cámara
            camera = new THREE.PerspectiveCamera(
                45,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 2, 8);
 
            // Renderer
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);
 
            // Controles
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 3;
            controls.maxDistance = 20;
            controls.maxPolarAngle = Math.PI / 1.5;
 
            // Iluminación
            setupLights();
 
            // Plataforma/Cuadro
            createPlatform();
 
            // Cargar modelo
            loadModel();
 
            // Clock para animaciones
            clock = new THREE.Clock();
 
            // Event listeners
            setupEventListeners();
 
            // Iniciar animación
            animate();
        }
 
        function setupLights() {
            // Luz ambiental
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
 
            // Luz principal
            const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
            mainLight.position.set(5, 10, 5);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            mainLight.shadow.camera.near = 0.1;
            mainLight.shadow.camera.far = 50;
            mainLight.shadow.camera.left = -10;
            mainLight.shadow.camera.right = 10;
            mainLight.shadow.camera.top = 10;
            mainLight.shadow.camera.bottom = -10;
            scene.add(mainLight);
 
            // Luces de relleno con colores

 

 
            // Luz de fondo
            const backLight = new THREE.DirectionalLight(0x764ba2, 1);
            backLight.position.set(0, 5, -10);
            scene.add(backLight);
        }
 
        function createPlatform() {
            // Plataforma hexagonal moderna
            const shape = new THREE.Shape();
            const radius = 3;
            const sides = 6;
            

 
            const extrudeSettings = {
                depth: 0.2,
                bevelEnabled: true,
                bevelThickness: 0.1,
                bevelSize: 0.1,
                bevelSegments: 3
            };
 
            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            const material = new THREE.MeshStandardMaterial({
                color: 0x1a1a2e,
                metalness: 0.7,
                roughness: 0.3,
                emissive: 0x667eea,
                emissiveIntensity: 0.2
            });
 
            platform = new THREE.Mesh(geometry, material);
            platform.rotation.x = -Math.PI / 2;
            platform.position.y = -0.5;
            platform.receiveShadow = true;
            scene.add(platform);
 
            // Borde brillante
            const edgeGeometry = new THREE.EdgesGeometry(geometry);
            const edgeMaterial = new THREE.LineBasicMaterial({ 
                color: 0x667eea,
                linewidth: 2
            });
            const edges = new THREE.LineSegments(edgeGeometry, edgeMaterial);
            platform.add(edges);
 
            // Anillo de partículas
            createParticleRing();
        }
 
        function createParticleRing() {
            const particleCount = 100;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
 
            for (let i = 0; i < particleCount; i++) {
                const angle = (i / particleCount) * Math.PI * 2;
                const radius = 3.5 + Math.random() * 0.5;
                positions[i * 3] = Math.cos(angle) * radius;
                positions[i * 3 + 1] = -0.3 + Math.random() * 0.2;
                positions[i * 3 + 2] = Math.sin(angle) * radius;
            }
 
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
 
            const material = new THREE.PointsMaterial({
                color: 0x667eea,
                size: 0.05,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });
 
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
 
            // Animar partículas
            function animateParticles() {
                const positions = particles.geometry.attributes.position.array;
                for (let i = 0; i < positions.length; i += 3) {
                    positions[i + 1] += Math.sin(Date.now() * 0.001 + i) * 0.001;
                }
                particles.geometry.attributes.position.needsUpdate = true;
                requestAnimationFrame(animateParticles);
            }
            animateParticles();
        }
 
        function loadModel() {
            const loader = new GLTFLoader();
            
            loader.load(
                MODEL_PATH,
                (gltf) => {
                    model = gltf.scene;
                    
                    // Ajustar escala y posición del modelo
                    const box = new THREE.Box3().setFromObject(model);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 2 / maxDim; // Ajusta este valor según necesites
                    
                    model.scale.multiplyScalar(scale);
                    
                    // Centrar modelo
                    box.setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    model.position.sub(center);
                    model.position.y += 1; // Elevar sobre la plataforma
 
                    // Habilitar sombras
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
 
                    scene.add(model);
 
                    // Configurar animaciones si existen
                    if (gltf.animations && gltf.animations.length > 0) {
                        mixer = new THREE.AnimationMixer(model);
                        gltf.animations.forEach((clip) => {
                            mixer.clipAction(clip).play();
                        });
                        document.getElementById('toggle-animation').style.display = 'block';
                    } else {
                        document.getElementById('toggle-animation').style.display = 'none';
                    }
 
                    // Ocultar loading
                    document.getElementById('loading').style.display = 'none';
                },
                (progress) => {
                    const percent = (progress.loaded / progress.total) * 100;
                    console.log(`Cargando: ${percent.toFixed(2)}%`);
                },
                (error) => {
                    console.error('Error cargando el modelo:', error);
                    document.getElementById('loading').innerHTML = `
                        <div style="color: #ff6b6b;">
                            ❌ Error al cargar el modelo<br>
                            <small>Verifica que la ruta sea correcta: ${MODEL_PATH}</small>
                        </div>
                    `;
                }
            );
        }
 
        function setupEventListeners() {
            // Toggle rotación automática
            document.getElementById('toggle-rotation').addEventListener('click', () => {
                autoRotate = !autoRotate;
                const btn = document.getElementById('toggle-rotation');
                btn.textContent = autoRotate ? '⏸ Pausar' : '▶ Rotar';
            });
 
            // Toggle animaciones
            document.getElementById('toggle-animation').addEventListener('click', () => {
                if (mixer) {
                    mixer.timeScale = mixer.timeScale === 0 ? 1 : 0;
                    const btn = document.getElementById('toggle-animation');
                    btn.textContent = mixer.timeScale === 0 ? '▶ Animación' : '⏸ Animación';
                }
            });
 
            // Resize
            window.addEventListener('resize', onWindowResize);
        }
 
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
 
        function animate() {
            requestAnimationFrame(animate);
 
            const delta = clock.getDelta();
 
            // Actualizar mixer de animaciones
            if (mixer) {
                mixer.update(delta);
            }
 
            // Rotación automática del modelo
            if (model && autoRotate) {
                model.rotation.y += 0.005;
                // Movimiento flotante sutil
                model.position.y = 1 + Math.sin(Date.now() * 0.001) * 0.1;
            }
 
            // Rotación lenta de la plataforma
            if (platform) {
                platform.rotation.z += 0.001;
            }
 
            controls.update();
            renderer.render(scene, camera);
        }
 
        // Iniciar
        init();
    </script>
</body>
</html>
